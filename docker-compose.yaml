services:
    neo4j:
        container_name: neo4j
        image: neo4j:5.26
        environment:
            NEO4J_AUTH: neo4j/admin123
        ports:
            - "7474:7474"
            - "7687:7687"
        volumes:
            - neo4j_data:/data
            - neo4j_logs:/logs
            - neo4j_import:/var/lib/neo4j/import
            - neo4j_plugins:/plugins
        healthcheck:
            test: ["CMD-SHELL", "cypher-shell -u neo4j -p admin123 'RETURN 1' || exit 1"]
            interval: 10s
            timeout: 10s
            retries: 10
            start_period: 30s
        networks:
            - graph_build
    
    kafka:
        container_name: kafka
        image: apache/kafka:4.0.0
        environment:
            CLUSTER_ID: "ohsmeurydgancgqeutld"
            KAFKA_NODE_ID: "0"
            KAFKA_PROCESS_ROLES: "broker,controller"
            KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
            KAFKA_LISTENERS: "CONTROLLER://0.0.0.0:9091,INSIDE://0.0.0.0:9092,OUTSIDE://0.0.0.0:9093"
            KAFKA_ADVERTISED_LISTENERS: "INSIDE://kafka:9092,OUTSIDE://localhost:9093"
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT"
            KAFKA_INTER_BROKER_LISTENER_NAME: "INSIDE"
            KAFKA_CONTROLLER_QUORUM_VOTERS: "0@kafka:9091"
            KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
            KAFKA_LOG_RETENTION_MS: 604800000 # 7 days
        volumes:
            - kafka_data:/var/lib/kafka/data
        ports:
            - "9093:9093"
        healthcheck:
            test: [ "CMD", "bash", "-c", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list" ]
            interval: 10s
            retries: 10
            timeout: 5s
            start_period: 20s
        networks:
            - graph_build
    
    kafka-init:
        container_name: kafka-init
        image: apache/kafka:4.0.0
        volumes:
            - ./scripts/create_kafka_topics.sh:/create_kafka_topics.sh
        depends_on:
            kafka:
                condition: service_healthy
        entrypoint: ["/create_kafka_topics.sh"]
        networks:
            - graph_build
        restart: "no"

volumes:
    neo4j_data:
    neo4j_logs:
    neo4j_import:
    neo4j_plugins:
    kafka_data:

networks:
    graph_build:
